apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.idp.company.io
  labels:
    app.kubernetes.io/managed-by: idp-platform
spec:
  group: idp.company.io
  scope: Cluster
  names:
    plural: projects
    singular: project
    kind: Project
    shortNames: [proj]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Team
          type: string
          jsonPath: .spec.teamSlug
        - name: GitHub
          type: string
          jsonPath: .status.githubRepoUrl
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [name, teamSlug]
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 128
                  pattern: '^[a-zA-Z][a-zA-Z0-9 _-]+$'
                teamSlug:
                  type: string
                description:
                  type: string
                ownerEmail:
                  type: string
                  format: email
                environments:
                  type: array
                  items:
                    type: object
                    required: [tier]
                    properties:
                      tier:
                        type: string
                        enum: [dev, staging, prod]
                      cpuRequest:
                        type: string
                      cpuLimit:
                        type: string
                      memoryRequest:
                        type: string
                      memoryLimit:
                        type: string
                tags:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Provisioning, Active, Failed, Deleting, Deleted]
                githubRepoUrl:
                  type: string
                k8sNamespace:
                  type: string
                argocdAppName:
                  type: string
                provisioningSteps:
                  type: object
                  additionalProperties:
                    type: string
                errorMessage:
                  type: string
                lastProvisionedAt:
                  type: string
                  format: date-time
